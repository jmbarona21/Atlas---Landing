<style>
  * { box-sizing: border-box; }
  body {

  }
  .emoji {

  a { text-decoration: none; }
  button { cursor: pointer; font-family: inherit; border: none; }
  input { font-family: inherit; }
  .lang-btn {
    font-weight: 700;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 999px;
    background: transparent;
    color: #88CCEE;
    border: 1.5px solid rgba(136,204,238,.35);
    transition: all .15s ease;
  }
  .lang-btn.active {
    background: #88CCEE;
    color: #0A2E44;
    border-color: #88CCEE;
  }

  header.site-header {

  .logo-wrap { display: flex; align-items: center; gap: 10px; }

  .hero-inner { position: relative; max-width: 860px; margin: 0 auto; padding: 88px 20px 72px; text-align: center; }
  .kicker {

    border-radius: 999px; padding: 7px 16px; background: rgba(232,138,75,.08);

  .kicker.light { color: #88CCEE; border-color: transparent; background: none; padding: 0; text-align: center; display: block; }
  h1.hero-title {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;

  .hero-sub { color: #88CCEE; font-size: clamp(16px,2.4vw,19px); line-height: 1.6; max-width: 640px; margin: 0 auto 34px; }
  .cta-btn {
    display: inline-block; background: #E88A4B; color: #0A2E44; font-weight: 700; font-size: 17px;

  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,138,75,.35); }

  h2.section-title {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(26px,4.5vw,38px);
    text-align: center; margin: 12px auto 10px; max-width: 640px;
  }
  .section-sub { color: #88CCEE; text-align: center; font-size: 16px; line-height: 1.6; max-width: 560px; margin: 0 auto 32px; }

  .pain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 16px; margin-top: 36px; }
  .pain-card { background: #FDFEFE; color: #0A2E44; border-radius: 18px; padding: 22px 20px; transition: transform .15s ease; }
  .pain-card:hover { transform: translateY(-3px); }
  .pain-icon { width: 42px; height: 42px; border-radius: 12px; background: #EAF4FA; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 14px; }
  .pain-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 6px; }
  .pain-desc { color: #4A6B80; font-size: 14.5px; line-height: 1.55; }

  .chat-card { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 24px 60px rgba(4,20,32,.45); color: #0A2E44; }
  .chat-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid #E7F0F5; }

  .chat-avatar .d { width: 9px; height: 9px; background: linear-gradient(180deg,#96B4FF,#141D59); transform: rotate(45deg); border-radius: 1.5px; }
  .chat-title { color: #0A2E44; font-weight: 700; font-size: 15px; font-family: 'Space Grotesk', sans-serif; }
  .chat-verified { display: flex; align-items: center; gap: 5px; color: #1D9E75; font-size: 12.5px; font-weight: 600; margin-top: 2px; }
  .chat-verified .check { display: inline-flex; width: 14px; height: 14px; border-radius: 50%; background: #1D9E75; color: #fff; align-items: center; justify-content: center; font-size: 9px; }
  .city-tabs { display: flex; gap: 8px; padding: 14px 20px 4px; flex-wrap: wrap; }
  .city-tab { background: #EAF4FA; color: #2277BB; font-weight: 600; font-size: 13px; padding: 8px 16px; border-radius: 999px; }
  .city-tab.active { background: #0A2E44; color: #fff; }
  .chat-window { height: 400px; overflow-y: auto; background: #F2F7FA; margin: 14px 0 0; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.user { justify-content: flex-end; }
  .msg-avatar { width: 26px; height: 26px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; background-color: #2E468C; }
  .msg-avatar .d { width: 7px; height: 7px; transform: rotate(45deg); border-radius: 1px; background: linear-gradient(180deg,#FFFFFF,#33A82D); }

  .bubble.user { background: #2277BB; color: #fff; border-radius: 16px 16px 4px 16px; }
  .chips { display: flex; gap: 8px; padding: 14px 20px 4px; flex-wrap: wrap; border-top: 1px solid #E7F0F5; }
  .chip { background: #fff; border: 1.5px solid #CFE3EE; color: #2277BB; font-weight: 600; font-size: 13px; padding: 8px 13px; border-radius: 999px; transition: background .15s ease; }
  .chip:hover { background: #EAF4FA; border-color: #2277BB; }
  .chat-input-row { display: flex; gap: 10px; padding: 14px 20px 8px; }
  .chat-input { flex: 1; min-width: 0; border: 1.5px solid #CFE3EE; border-radius: 12px; padding: 12px 14px; font-size: 15px; color: #0A2E44; background: #FBFDFE; outline: none; }
  .chat-input:focus { border-color: #2277BB; }
  .send-btn { background: #E88A4B; color: #0A2E44; border-radius: 12px; padding: 12px 20px; font-weight: 700; font-size: 15px; transition: transform .15s ease; }
  .send-btn:hover { transform: translateY(-1px); }
  .chat-disclaimer { text-align: center; color: #9BB2C1; font-size: 12px; padding: 4px 20px 16px; }
  .typing-row { display: flex; gap: 8px; align-items: flex-end; }
  .typing-bubble { background: #fff; border: 1px solid #DCE9F0; border-radius: 16px 16px 16px 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #2277BB; display: inline-block; animation: dotB 1.1s infinite; }

  .city-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 18px; }
  .city-card { position: relative; border-radius: 20px; overflow: hidden; background: #123F5E; min-height: 360px; transition: transform .2s ease; }
  .city-card:hover { transform: translateY(-5px); }
  .city-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .city-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,46,68,.95) 0%, rgba(10,46,68,.35) 45%, rgba(10,46,68,.05) 70%); }
  .city-badge { position: absolute; top: 14px; right: 14px; background: #E88A4B; color: #0A2E44; font-weight: 700; font-size: 12px; padding: 6px 12px; border-radius: 999px; }
  .city-info { position: absolute; left: 0; right: 0; bottom: 0; padding: 20px; }
  .city-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; }
  .city-tag { color: #fff; opacity: .92; font-size: 14.5px; margin: 4px 0 8px; }
  .city-land { color: #88CCEE; font-size: 12.5px; font-weight: 600; letter-spacing: .04em; }

  .waitlist-box { background: linear-gradient(135deg,#0F3E5C,#14486B); border: 1px solid rgba(136,204,238,.22); border-radius: 26px; padding: clamp(32px,6vw,56px) 24px; text-align: center; }
  .waitlist-form { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .waitlist-input { flex: 1; min-width: 240px; max-width: 360px; border: 1.5px solid rgba(136,204,238,.4); border-radius: 13px; padding: 14px 16px; font-size: 15px; color: #0A2E44; background: #fff; outline: none; }
  .waitlist-input:focus { border-color: #88CCEE; }
  .waitlist-btn { background: #E88A4B; color: #0A2E44; border-radius: 13px; padding: 14px 26px; font-weight: 700; font-size: 16px; transition: transform .15s ease, box-shadow .15s ease; }
  .waitlist-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,138,75,.35); }

  .footer-badge { position: relative; width: 30px; height: 30px; flex: none; }
  .footer-badge .notch { position: absolute; left: 3px; bottom: 1px; width: 8px; height: 8px; background: #0E3A57; transform: rotate(45deg); }
  .footer-badge .square { position: absolute; left: 1px; top: 0; width: 27px; height: 27px; background: #0E3A57; border: 1.5px solid #2277BB; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .footer-badge .circle { width: 16px; height: 16px; border: 1.5px solid #88CCEE; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .footer-badge .dot { width: 6px; height: 6px; background: #33BB99; transform: rotate(45deg); border-radius: 1px; }
  .footer-brand-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: .06em; }
  .footer-brand-tag { color: #88CCEE; font-size: 12px; }
  .footer-rights { color: #88CCEE; font-size: 13px; }

</head>

<header class="site-header">
  <div class="header-inner">

</header>

<div class="hero-section">

</div>

<section>

</section>

<section id="demo">

<section>

      </div>
    </div>
  </div>
</section>

      <div class="footer-badge">
        <div class="square"><div class="circle"><div class="dot"></div></div></div>
        <div class="notch"></div>
      </div>
      <div>

      </div>
    </div>
    <div class="footer-rights"><span data-i18n="footRights"></span></div>
    <div class="lang-toggle">

      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>

  </div>
</footer>

let currentLang = "es";
let currentCity = "paris";

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  render();
}

function t() { return T[currentLang]; }

function render() {
  const tr = t();
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (tr[key] !== undefined) el.textContent = tr[key];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    const key = el.getAttribute("data-i18n-ph");
    if (tr[key] !== undefined) el.placeholder = tr[key];
  });

  const painGrid = document.getElementById("painGrid");
  painGrid.innerHTML = tr.pains.map(p => `
    <div class="pain-card">
      <div class="pain-icon emoji">${p.i}</div>
      <div class="pain-title">${p.t}</div>
      <div class="pain-desc">${p.d}</div>
    </div>
  `).join("");

  const cityTabs = document.getElementById("cityTabs");
  cityTabs.innerHTML = CITIES.map(c => `
    <button class="city-tab ${c.id === currentCity ? 'active' : ''}" onclick="pickCity('${c.id}')">${currentLang === 'es' ? c.nameEs : c.nameEn}</button>
  `).join("");

  document.getElementById("chatCityName").textContent = currentLang === "es"
    ? CITIES.find(c => c.id === currentCity).nameEs
    : CITIES.find(c => c.id === currentCity).nameEn;

  renderChat();

  document.getElementById("chips").innerHTML = tr.chips.map(ch => `
    <button class="chip" onclick="useChip('${ch.label.replace(/'/g, "\\'")}')"><span class="emoji">${ch.icon}</span> ${ch.label}</button>
  `).join("");

  const cityGrid = document.getElementById("cityGrid");
  cityGrid.innerHTML = CITIES.map(c => `
    <div class="city-card">
      <img src="${c.img}" alt="${currentLang === 'es' ? c.nameEs : c.nameEn}">
      <div class="city-overlay"></div>
      <div class="city-badge">${tr.soon}</div>
      <div class="city-info">
        <div class="city-name">${currentLang === 'es' ? c.nameEs : c.nameEn}</div>
        <div class="city-tag">${currentLang === 'es' ? c.tagEs : c.tagEn}</div>
        <div class="city-land">${c.land}</div>
      </div>
    </div>
  `).join("");
}

function renderChat() {
  const city = CITIES.find(c => c.id === currentCity);
  const convo = city.convo[currentLang];
  const win = document.getElementById("chatWindow");
  win.innerHTML = convo.map(m => {
    if (m.user) {
      return `<div class="msg-row user"><div class="bubble user">${escapeHtml(m.user)}</div></div>`;
    } else {
      return `<div class="msg-row"><div class="msg-avatar"><div class="d"></div></div><div class="bubble bot emoji">${escapeHtml(m.bot)}</div></div>`;
    }
  }).join("");
  win.scrollTop = 0;
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

function pickCity(id) {
  currentCity = id;
  render();
}

function useChip(label) {
  document.getElementById("draftInput").value = label;
  sendDraft();
}

function sendDraft() {
  const input = document.getElementById("draftInput");
  const val = input.value.trim();
  if (!val) return;
  const win = document.getElementById("chatWindow");
  win.insertAdjacentHTML("beforeend", `<div class="msg-row user"><div class="bubble user">${escapeHtml(val)}</div></div>`);
  input.value = "";
  win.scrollTop = win.scrollHeight;

  const typingHtml = `<div class="msg-row typing-temp"><div class="msg-avatar"><div class="d"></div></div><div class="typing-bubble"><span class="dot"></span><span class="dot" style="animation-delay:.15s"></span><span class="dot" style="animation-delay:.3s"></span><span style="color:#7C97A8;font-size:12px;margin-left:4px" class="emoji">${t().typingLabel}</span></div></div>`;
  win.insertAdjacentHTML("beforeend", typingHtml);
  win.scrollTop = win.scrollHeight;

  setTimeout(() => {
    const temp = win.querySelector(".typing-temp");
    if (temp) temp.remove();
    const reply = currentLang === "es"
      ? "Esto es una demo — cuando ATLAS esté disponible en tu ciudad, te contesto esto al instante con info real y actualizada 🤙"
      : "This is just a demo — once ATLAS is live in your city, I'll answer this instantly with real, up-to-date info 🤙";
    win.insertAdjacentHTML("beforeend", `<div class="msg-row"><div class="msg-avatar"><div class="d"></div></div><div class="bubble bot emoji">${escapeHtml(reply)}</div></div>`);
    win.scrollTop = win.scrollHeight;
  }, 900);
}

function submitEmail() {
  const input = document.getElementById("emailInput");
  const val = input.value.trim();
  if (!val || !val.includes("@")) {
    input.style.borderColor = "#E88A4B";
    return;
  }
  document.getElementById("wlForm").style.display = "none";
  document.getElementById("wlSuccess").classList.add("show");
}

setLang("es");
</script>
